name: CI

on:
  workflow_dispatch:
  push:
    branches: [ main, dev, chore/**, docs/**, feat/** ]
    tags:
      - "v*"
  pull_request:
    branches: [ main ]

jobs:
  docs-strict:
    name: docs-strict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies (docs)
        run: |
          python -m pip install -U pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
          python -m pip install -e .

      - name: Build docs (workbook strict)
        run: make docs-workbook-strict
  power-analysis-dependency-matrix:
    name: power-analysis-dependency-matrix (${{ matrix.scipy_requirement }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scipy_requirement: ["scipy==1.11.*", "scipy"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run stable Chapter 20 power regression checks
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install numpy pandas matplotlib "${{ matrix.scipy_requirement }}" pytest
          python -m pip install -e . --no-deps
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 python -m pytest -q tests/test_psych_ch20_problem_set.py

  wheel-smoke:
    name: wheel-smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build wheel
        run: |
          python -m pip install -U pip
          python -m pip install build
          python -m build --wheel

      - name: Install wheel + smoke test (posix)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          python -m venv /tmp/wheeltest
          source /tmp/wheeltest/bin/activate
          python -m pip install -U pip
          python -m pip install dist/*.whl
          python -m pip install pytest
          python -c "from importlib import resources; p = resources.files('pystatsv1.assets') / 'workbook_starter.zip'; assert p.is_file(), p"
          python -c "from importlib import resources; p = resources.files('pystatsv1.assets') / 'psych_stats_with_python_companion_v0_2.zip'; assert p.is_file(), p"
          python -c "from importlib import resources; p = resources.files('pystatsv1.assets') / 'psych_stats_with_python_companion_v0_2_1.zip'; assert p.is_file(), p"
          pystatsv1 book1 init --dest /tmp/book1_smoke
          pystatsv1 book1 verify --dest /tmp/book1_smoke
          test -f /tmp/book1_smoke/scripts/python/generate_figures.py
          test -f /tmp/book1_smoke/BOOK1_PORTAL_HANDOFF_RECEIPT.json
          test -f /tmp/book1_smoke/BOOK1_MAINTENANCE_RECEIPT.json
          python -m pip install -r /tmp/book1_smoke/requirements-book1-companion.txt
          make -C /tmp/book1_smoke design-audit
          make -C /tmp/book1_smoke figures
          test -f /tmp/book1_smoke/outputs/figure_manifest.json
          test -f /tmp/book1_smoke/outputs/figures/fig_11_1_regression_scatter.png
          pystatsv1 workbook init --dest /tmp/wb_smoke
          test -f /tmp/wb_smoke/Makefile
          test -f /tmp/wb_smoke/scripts/psych_ch10_problem_set.py
          pystatsv1 workbook run ch10 --workdir /tmp/wb_smoke
          pystatsv1 workbook check ch10 --workdir /tmp/wb_smoke

      - name: Install wheel + smoke test (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          python -m venv wheeltest
          .\wheeltest\Scripts\python -m pip install -U pip
          $wheel = Get-ChildItem dist\*.whl | Select-Object -First 1
          .\wheeltest\Scripts\python -m pip install $wheel.FullName
          .\wheeltest\Scripts\python -m pip install pytest
          .\wheeltest\Scripts\python -c "from importlib import resources; p = resources.files('pystatsv1.assets') / 'workbook_starter.zip'; assert p.is_file(), p"
          .\wheeltest\Scripts\python -c "from importlib import resources; p = resources.files('pystatsv1.assets') / 'psych_stats_with_python_companion_v0_2.zip'; assert p.is_file(), p"
          .\wheeltest\Scripts\python -c "from importlib import resources; p = resources.files('pystatsv1.assets') / 'psych_stats_with_python_companion_v0_2_1.zip'; assert p.is_file(), p"
          .\wheeltest\Scripts\pystatsv1.exe book1 init --dest book1_smoke
          .\wheeltest\Scripts\pystatsv1.exe book1 verify --dest book1_smoke
          if (!(Test-Path book1_smoke\scripts\python\generate_figures.py)) { throw 'Missing Book 1 figure generator' }
          if (!(Test-Path book1_smoke\BOOK1_PORTAL_HANDOFF_RECEIPT.json)) { throw 'Missing Book 1 portal handoff receipt' }
          if (!(Test-Path book1_smoke\BOOK1_MAINTENANCE_RECEIPT.json)) { throw 'Missing Book 1 maintenance receipt' }
          .\wheeltest\Scripts\python -m pip install -r book1_smoke\requirements-book1-companion.txt
          Push-Location book1_smoke
          ..\wheeltest\Scripts\python scripts\python\audit_design_contract.py --root .
          ..\wheeltest\Scripts\python scripts\python\generate_figures.py
          Pop-Location
          if (!(Test-Path book1_smoke\outputs\figure_manifest.json)) { throw 'Missing Book 1 public figure manifest' }
          if (!(Test-Path book1_smoke\outputs\figures\fig_11_1_regression_scatter.png)) { throw 'Missing Book 1 regression figure' }
          .\wheeltest\Scripts\pystatsv1.exe workbook init --dest wb_smoke
          if (!(Test-Path wb_smoke\Makefile)) { throw 'Missing Makefile' }
          if (!(Test-Path wb_smoke\scripts\psych_ch10_problem_set.py)) { throw 'Missing script psych_ch10_problem_set.py' }
          .\wheeltest\Scripts\pystatsv1.exe workbook run ch10 --workdir wb_smoke
          .\wheeltest\Scripts\pystatsv1.exe workbook check ch10 --workdir wb_smoke


  book1-companion-release-smoke:
    name: book1-companion-release-smoke (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install R for public companion parity smoke
        run: |
          sudo apt-get update
          sudo apt-get install --yes r-base

      - name: Build wheel and run released Book 1 workflow
        run: |
          set -euo pipefail
          python -m pip install -U pip build
          python -m build --wheel
          python -m venv /tmp/book1-release-smoke
          source /tmp/book1-release-smoke/bin/activate
          python -m pip install -U pip
          python -m pip install dist/*.whl
          pystatsv1 book1 init --dest /tmp/book1-public
          python -m pip install -r /tmp/book1-public/requirements-book1-companion.txt
          make -C /tmp/book1-public design-audit
          make -C /tmp/book1-public figures
          make -C /tmp/book1-public all
          pystatsv1 book1 verify --dest /tmp/book1-public
          test -f /tmp/book1-public/outputs/figure_manifest.json
          test -f /tmp/book1-public/outputs/figures/fig_10_1_correlation_scatter.png
          test -f /tmp/book1-public/outputs/figures/fig_11_1_regression_scatter.png

  psych-design-swl-first-batch-r-verify:
    name: psych-design-swl-first-batch-r-verify (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python and R dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes r-base
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
          python -m pip install -e .

      - name: Verify SWL-S02 through SWL-S05 candidate
        run: |
          set -euo pipefail
          make psych-design-swl-s02-s05-verify
          make psych-design-swl-s02-s05-r-verify

  windows-py310:
    runs-on: windows-latest
    timeout-minutes: 20
    env:
      PYTHONIOENCODING: utf-8
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip

      - name: Install make (Chocolatey)
        run: choco install make -y

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) { pip install -r requirements.txt } else { pip install numpy pandas statsmodels matplotlib scipy }
          if (Test-Path requirements-dev.txt) { pip install -r requirements-dev.txt } else { pip install ruff pytest }
          pip install -e .

      - name: Lint
        run: make lint

      - name: Build docs
        run: make docs

      - name: Tests
        run: make test

      - name: Tiny Chapter 13 smoke
        run: make ch13-ci

      - name: Upload artifacts (plots & data)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ch13-artifacts
          if-no-files-found: ignore
          path: |
            data/synthetic/**
            outputs/**
