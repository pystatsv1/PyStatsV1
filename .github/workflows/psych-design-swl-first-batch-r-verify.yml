name: Psych Design SWL First Batch R Verify

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  psych-design-swl-first-batch-r-verify:
    name: psych-design-swl-first-batch-r-verify (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install Python and R dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes r-base
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
          python -m pip install -e .

      - name: Verify SWL-S02 through SWL-S05 candidate
        run: |
          set -euo pipefail
          make psych-design-swl-s02-s05-verify
          make psych-design-swl-s02-s05-r-verify
