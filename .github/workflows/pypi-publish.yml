name: Publish to PyPI (trusted publisher)

# Release policy: CI runs on v* tags first. Publish only after the tag CI is green.
# Run manually against the release tag, for example:
#   gh workflow run pypi-publish.yml --ref v0.23.0
on:
  workflow_dispatch:

jobs:
  build-and-publish:
    environment: pypi
    runs-on: ubuntu-latest
    permissions:
      id-token: write    # needed for trusted publishing
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Verify annotated release tag matches package version
        run: python tools/check_release_tag.py

      - name: Install build backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build distributions
        run: python -m build

      - name: Publish to PyPI via trusted publisher
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true
